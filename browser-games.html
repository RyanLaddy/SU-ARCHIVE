<!DOCTYPE html>
<html>
<head>
  <title>Browser Games</title>

  <style>
    body {
      background: #1e1e1e;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    button {
      margin: 10px;
      padding: 10px;
      background: #333;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    iframe {
      margin-top: 20px;
      width: 800px;
      height: 500px;
      border: none;
      background: black;
    }
  </style>
</head>
<body>

<h1>Browser Games</h1>

<div id="gameList"></div>
<iframe id="gameFrame"></iframe>

<script>
  // 👇 MANUAL LIST (this replaces auto folder reading)
  const games = [
    { name: "Click Game", file: "click-game.html" },
    { name: "Snake", file: "snake.html" }
  ];

  const list = document.getElementById("gameList");
  const frame = document.getElementById("gameFrame");

  games.forEach(game => {
    const btn = document.createElement("button");
    btn.textContent = game.name;

    btn.onclick = () => {
      frame.src = "browser-games/" + game.file;
    };

    list.appendChild(btn);
  });
</script>

</body>
</html>
