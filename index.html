<!DOCTYPE html>
<html>
<head>
  <title>SU-ARCHIVE HOME</title>

  <style>
    body {
      background-color: #1e1e1e;
      color: #e0e0e0;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
    }

    header {
      background-color: #2a2a2a;
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 1px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.5);
    }

    h1 {
      margin-top: 40px;
      font-weight: normal;
    }

    .container {
      margin-top: 40px;
    }

    .btn {
      display: block;
      width: 250px;
      margin: 15px auto;
      padding: 15px;
      font-size: 16px;
      background-color: #333;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn:hover {
      background-color: #444;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <header>SU-ARCHIVE</header>

  <h1>Choose what Archive you would like to use</h1>

  <div class="container">
    <button class="btn" onclick="location.href='games.html'">Games</button>
    <button class="btn" onclick="location.href='software.html'">Software</button>
    <button class="btn" onclick="location.href='utilities.html'">Utilities</button>
    <button class="btn" onclick="location.href='browser-games.html'">Play Games in Browser</button>
  </div>

</body>
